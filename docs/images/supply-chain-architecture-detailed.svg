<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" width="1400" height="780">
  <defs>
    <style>
      text { font-family: 'Segoe UI', -apple-system, sans-serif; }
      .platform-border { fill: #ffffff; stroke: #b0b0b0; stroke-width: 1.5; stroke-dasharray: 8,5; rx: 14; ry: 14; }
      .platform-title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .section-title { font-size: 12px; font-weight: 600; fill: #444; }
      .component-box { fill: #ffffff; stroke: #d0d0d0; stroke-width: 1.2; rx: 8; ry: 8; }
      .component-text { font-size: 11px; fill: #333; text-anchor: middle; }
      .component-text-sm { font-size: 10px; fill: #555; text-anchor: middle; }
      .data-region { fill: #eaf6ff; stroke: #a8d4f0; stroke-width: 1.2; rx: 10; ry: 10; }
      .data-box { fill: #f0f8ff; stroke: #b8ddf5; stroke-width: 1; rx: 6; ry: 6; }
      .d365-region { fill: #fff4e6; stroke: #f0c878; stroke-width: 1.2; rx: 10; ry: 10; }
      .d365-box { fill: #fffbf0; stroke: #f0d090; stroke-width: 1; rx: 6; ry: 6; }
      .foundation-label { font-size: 11px; font-weight: 600; fill: #1a6fb5; }
      .d365-label { font-size: 11px; font-weight: 600; fill: #a06800; }
      .connector { fill: none; stroke: #a0a0a0; stroke-width: 1.3; stroke-dasharray: 5,4; }
      .connector-solid { fill: none; stroke: #a0a0a0; stroke-width: 1.3; }
      .arrow { fill: #a0a0a0; }
      .flow-label { font-size: 9px; fill: #888; text-anchor: middle; }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" class="arrow"/>
    </marker>
    <marker id="arr-rev" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0,0 3.5,9 7" class="arrow"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1400" height="780" fill="#f9fafb"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- DATABRICKS — System of Intelligence (Left) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="30" y="25" width="380" height="370" class="platform-border"/>
  <text x="65" y="55" class="platform-title">📊 Databricks</text>
  <text x="65" y="73" style="font-size:11px;fill:#666;">System of Intelligence</text>

  <!-- Min-Max Candidate Engine -->
  <rect x="55" y="95" width="155" height="60" class="component-box" filter="url(#shadow)"/>
  <text x="132" y="120" class="component-text">Min-Max</text>
  <text x="132" y="135" class="component-text">Candidate Engine</text>

  <!-- Velocity &amp; History Analysis -->
  <rect x="235" y="95" width="150" height="60" class="component-box" filter="url(#shadow)"/>
  <text x="310" y="120" class="component-text">Velocity &amp;</text>
  <text x="310" y="135" class="component-text">History Analysis</text>

  <!-- Databricks SQL -->
  <rect x="55" y="200" width="155" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="132" y="232" class="component-text">Databricks SQL</text>

  <!-- Demand Forecasting -->
  <rect x="235" y="200" width="150" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="310" y="225" class="component-text">Demand</text>
  <text x="310" y="240" class="component-text">Forecasting</text>

  <!-- Daily Candidate Notebook -->
  <rect x="55" y="300" width="330" height="50" class="component-box" filter="url(#shadow)"/>
  <text x="220" y="329" class="component-text">01_min_max_candidates.sql (Daily Notebook)</text>

  <!-- Internal arrows -->
  <line x1="132" y1="200" x2="132" y2="158" class="connector-solid" marker-end="url(#arr)"/>
  <line x1="310" y1="200" x2="310" y2="158" class="connector-solid" marker-end="url(#arr)"/>
  <line x1="220" y1="300" x2="220" y2="258" class="connector-solid" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- Warehouse Data Foundation (Bottom-Left) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="30" y="430" width="380" height="320" class="data-region"/>

  <rect x="48" y="465" width="68" height="55" class="data-box" filter="url(#shadow)"/>
  <text x="82" y="489" class="component-text">Candi-</text>
  <text x="82" y="503" class="component-text">dates</text>

  <rect x="126" y="465" width="68" height="55" class="data-box" filter="url(#shadow)"/>
  <text x="160" y="489" class="component-text">SKU</text>
  <text x="160" y="503" class="component-text">Inventory</text>

  <rect x="204" y="465" width="68" height="55" class="data-box" filter="url(#shadow)"/>
  <text x="238" y="489" class="component-text">Open</text>
  <text x="238" y="503" class="component-text">Orders</text>

  <rect x="282" y="465" width="55" height="55" class="data-box" filter="url(#shadow)"/>
  <text x="309" y="496" class="component-text">Waves</text>

  <rect x="347" y="465" width="55" height="55" class="data-box" filter="url(#shadow)"/>
  <text x="374" y="489" class="component-text">Capa-</text>
  <text x="374" y="503" class="component-text">city</text>

  <text x="55" y="720" class="foundation-label">🔵 Warehouse Data Foundation (data/)</text>

  <!-- Arrow: Data → Databricks -->
  <line x1="220" y1="430" x2="220" y2="398" class="connector" marker-end="url(#arr)"/>
  <text x="240" y="418" class="flow-label">read candidates</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- MICROSOFT 365 COPILOT (Center-Top) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="450" y="25" width="380" height="235" class="platform-border"/>
  <text x="485" y="55" class="platform-title">🔵 Microsoft 365 Copilot</text>

  <!-- Copilot Studio sub-label -->
  <text x="485" y="80" class="section-title">Copilot Studio — Hub</text>

  <!-- Replenishment Assistant -->
  <rect x="485" y="95" width="155" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="562" y="118" class="component-text">Replenishment</text>
  <text x="562" y="133" class="component-text">Assistant</text>

  <!-- Topics &amp; Flows -->
  <rect x="665" y="95" width="140" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="735" y="118" class="component-text">Topics &amp;</text>
  <text x="735" y="133" class="component-text">Flows</text>

  <!-- Topic examples -->
  <text x="562" y="175" class="component-text-sm">GetReplenRecommendations</text>
  <text x="562" y="189" class="component-text-sm">ApproveMinMax</text>
  <text x="735" y="175" class="component-text-sm">ExplainRejection</text>
  <text x="735" y="189" class="component-text-sm">PlanCrossFacility</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- Teams Channel (Center-Mid) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="450" y="290" width="380" height="160" class="platform-border"/>
  <text x="580" y="316" class="platform-title">Teams Channel</text>
  <text x="580" y="332" style="font-size:10px;fill:#777;font-style:italic;">Human-in-the-Loop Approval</text>

  <rect x="475" y="345" width="100" height="50" class="component-box" filter="url(#shadow)"/>
  <text x="525" y="374" class="component-text">Approval Cards</text>

  <rect x="590" y="345" width="100" height="50" class="component-box" filter="url(#shadow)"/>
  <text x="640" y="374" class="component-text">Rejection Cards</text>

  <rect x="705" y="345" width="100" height="50" class="component-box" filter="url(#shadow)"/>
  <text x="755" y="367" class="component-text">Planner</text>
  <text x="755" y="382" class="component-text">Conversations</text>

  <!-- Arrow: Teams → Copilot Studio -->
  <line x1="640" y1="290" x2="640" y2="263" class="connector" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- FastAPI Backend (Center-Bottom) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="450" y="485" width="380" height="115" class="platform-border" style="stroke:#70b070;"/>
  <text x="485" y="512" class="platform-title">⚡ FastAPI Backend</text>
  <text x="485" y="527" style="font-size:10px;fill:#666;">src/app/ — REST API bridge</text>

  <rect x="475" y="540" width="105" height="42" class="component-box" filter="url(#shadow)"/>
  <text x="527" y="560" class="component-text">/recommendations</text>
  <text x="527" y="573" class="component-text">/sequential</text>

  <rect x="595" y="540" width="80" height="42" class="component-box" filter="url(#shadow)"/>
  <text x="635" y="565" class="component-text">/validate</text>

  <rect x="690" y="540" width="80" height="42" class="component-box" filter="url(#shadow)"/>
  <text x="730" y="565" class="component-text">/approve</text>

  <!-- Arrow: Backend → Copilot (up, via Topics) -->
  <line x1="640" y1="485" x2="640" y2="453" class="connector" marker-end="url(#arr)"/>
  <text x="660" y="472" class="flow-label">REST tools</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- MICROSOFT FOUNDRY — Reasoning Engine (Right) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="870" y="25" width="500" height="370" class="platform-border"/>
  <text x="905" y="55" class="platform-title">🟣 Microsoft Foundry</text>
  <text x="905" y="73" style="font-size:11px;fill:#666;">Reasoning Engine</text>

  <!-- Orchestration annotation -->
  <text x="1190" y="73" class="component-text-sm" style="fill:#888;">Sequential / Multi-Agent Orchestration</text>

  <!-- Agent Framework sub-region -->
  <rect x="890" y="85" width="460" height="140" class="platform-border" style="stroke-dasharray:4,3;"/>
  <text x="915" y="108" class="section-title">🔵 Agent Framework</text>

  <!-- Retriever Agent -->
  <rect x="910" y="118" width="120" height="60" class="component-box" filter="url(#shadow)"/>
  <text x="970" y="143" class="component-text">Retriever</text>
  <text x="970" y="158" class="component-text">Agent</text>
  <text x="970" y="171" class="component-text-sm" style="fill:#888;">(replen-retriever)</text>

  <!-- Validator Agent -->
  <rect x="1055" y="118" width="120" height="60" class="component-box" filter="url(#shadow)"/>
  <text x="1115" y="143" class="component-text">Validator</text>
  <text x="1115" y="158" class="component-text">Agent</text>
  <text x="1115" y="171" class="component-text-sm" style="fill:#888;">(replen-validator)</text>

  <!-- Recommender Agent -->
  <rect x="1200" y="118" width="120" height="60" class="component-box" filter="url(#shadow)"/>
  <text x="1260" y="143" class="component-text">Recommender</text>
  <text x="1260" y="158" class="component-text">Agent</text>
  <text x="1260" y="171" class="component-text-sm" style="fill:#888;">(replen-recommender)</text>

  <!-- Flow arrows between agents -->
  <line x1="1030" y1="148" x2="1052" y2="148" class="connector-solid" marker-end="url(#arr)"/>
  <line x1="1175" y1="148" x2="1197" y2="148" class="connector-solid" marker-end="url(#arr)"/>

  <!-- Azure OpenAI (gpt-4o) -->
  <rect x="910" y="270" width="130" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="975" y="295" class="component-text">Azure OpenAI</text>
  <text x="975" y="310" class="component-text">gpt-4o</text>

  <!-- Application Insights -->
  <rect x="1065" y="270" width="130" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="1130" y="295" class="component-text">Application</text>
  <text x="1130" y="310" class="component-text">Insights</text>

  <!-- Key Vault -->
  <rect x="1220" y="270" width="100" height="55" class="component-box" filter="url(#shadow)"/>
  <text x="1270" y="301" class="component-text">Key Vault</text>

  <!-- Arrows from services up to Agent Framework -->
  <line x1="975" y1="270" x2="975" y2="228" class="connector" marker-end="url(#arr)"/>
  <line x1="1130" y1="270" x2="1130" y2="228" class="connector" marker-end="url(#arr)"/>
  <text x="975" y="255" class="flow-label">model</text>
  <text x="1130" y="255" class="flow-label">trace</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- D365 F&amp;O — System of Record (Bottom-Right) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <rect x="920" y="430" width="400" height="320" class="d365-region"/>

  <rect x="960" y="475" width="140" height="55" class="d365-box" filter="url(#shadow)"/>
  <text x="1030" y="499" class="component-text">Min-Max</text>
  <text x="1030" y="514" class="component-text">Parameters</text>

  <rect x="1130" y="475" width="140" height="55" class="d365-box" filter="url(#shadow)"/>
  <text x="1200" y="499" class="component-text">Open Orders &amp;</text>
  <text x="1200" y="514" class="component-text">Wave Status</text>

  <text x="960" y="720" class="d365-label">📦 D365 F&amp;O — System of Record</text>
  <text x="960" y="735" style="font-size:9px;fill:#888;">(writes only via /approve after human approval)</text>

  <!-- Arrow: D365 ↔ Foundry -->
  <line x1="1120" y1="430" x2="1120" y2="398" class="connector" marker-end="url(#arr)" marker-start="url(#arr-rev)"/>
  <text x="1145" y="418" class="flow-label">read/write</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- Cross-platform connectors -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Databricks ↔ Copilot Studio -->
  <line x1="410" y1="140" x2="447" y2="140" class="connector" marker-end="url(#arr)" marker-start="url(#arr-rev)"/>

  <!-- Copilot Studio ↔ Foundry -->
  <line x1="830" y1="140" x2="867" y2="140" class="connector" marker-end="url(#arr)" marker-start="url(#arr-rev)"/>

  <!-- Backend → Foundry -->
  <path d="M 830 560 Q 870 560 870 398" class="connector" marker-end="url(#arr)"/>
  <text x="860" y="470" class="flow-label" style="writing-mode:tb;">workflow</text>

  <!-- Backend → Databricks -->
  <path d="M 450 560 Q 410 560 410 398" class="connector" marker-end="url(#arr)"/>
  <text x="420" y="470" class="flow-label" style="writing-mode:tb;">candidates</text>

</svg>

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service. The trailing slash on proxy_pass
    # strips the "/api" prefix so "/api/recommendations" -> "/recommendations".
    # "backend" resolves on the Docker Compose network (see docker-compose.yml).
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
